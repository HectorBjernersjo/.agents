<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PR Review</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-csharp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-typescript.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #151820;
      --surface: #1d222d;
      --surface-muted: #252b37;
      --table-surface: #24212a;
      --table-header: #2b2a34;
      --table-subtle: rgba(255, 239, 214, 0.035);
      --surface-subtle: rgba(255, 255, 255, 0.03);
      --text: #edf2f7;
      --muted: #aeb8c5;
      --muted-2: #8f9baa;
      --border: #3d4350;
      --border-subtle: #38313d;
      --accent: #8ab4ff;
      --accent-bg: rgba(138, 180, 255, 0.14);
      --high: #ff8b82;
      --high-bg: rgba(255, 0, 0, 0.05);
      --medium: #e3bb68;
      --medium-bg: rgba(255, 200, 0, 0.05);
      --low-bg: rgba(180, 180, 180, 0.05);
      --low: #aeb8c5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 15px/1.55 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 32px;
    }

    h1, h2 {
      margin: 0;
      line-height: 1.15;
    }

    h1 {
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    h2 {
      margin-top: 6px;
      font-size: 16px;
      letter-spacing: -0.01em;
    }

    .muted {
      color: var(--muted);
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 16px;
      margin: 24px 0 28px;
    }

    .stat {
      display: grid;
      justify-items: center;
      gap: 7px;
      padding: 10px 12px;
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 27px;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      column-gap: 28px;
      row-gap: 8px;
      align-items: center;
      margin: 0 0 24px;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    button, .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--text);
      padding: 5px 11px;
      font: inherit;
      font-size: 13px;
      line-height: 1.35;
    }

    button {
      cursor: pointer;
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-bg);
    }

    .pill.high {
      border-color: rgba(255, 123, 114, 0.5);
      color: var(--high);
      background: var(--high-bg);
    }

    .pill.medium {
      border-color: rgba(214, 169, 79, 0.5);
      color: var(--medium);
      background: var(--medium-bg);
    }

    .pill.low {
      color: var(--low);
      background: var(--low-bg);
    }

    .table-wrap {
      max-height: 76vh;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--table-surface);
    }

    table {
      width: 100%;
      min-width: 0;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th, td {
      padding: 14px;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: top;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--table-header);
      color: var(--muted);
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    th button.sort-button {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      padding: 0;
      font: inherit;
      text-transform: inherit;
      letter-spacing: inherit;
    }

    th button.sort-button:hover {
      color: var(--accent);
    }

    .sort-indicator {
      color: var(--muted-2);
      font-size: 11px;
      text-transform: none;
      letter-spacing: 0;
    }

    tbody tr:nth-child(even) {
      background: var(--table-subtle);
    }

    tbody tr.high {
      background: var(--high-bg);
    }

    tbody tr.medium {
      background: var(--medium-bg);
    }

    .review-row {
      cursor: pointer;
    }

    .review-row:hover {
      background: rgba(138, 180, 255, 0.08);
    }

    .expanded-row td {
      background: var(--table-surface);
      padding: 0;
      text-align: left;
    }

    .expanded-content {
      display: grid;
      gap: 18px;
      padding: 20px 22px 22px 78px;
      border-top: 1px solid var(--border-subtle);
      text-align: left;
    }

    .expanded-content h3 {
      margin: 0 0 6px;
      font-size: 12.5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    .expanded-content p {
      margin: 0 0 12px;
      white-space: pre-line;
    }

    .expanded-content p:last-child {
      margin-bottom: 0;
    }

    .rich-text pre {
      margin: 10px 0 14px;
      padding: 12px;
      overflow: auto;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: #0b0e14;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.5;
    }

    .rich-text :not(pre) > code {
      padding: 1px 4px;
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      background: var(--surface-muted);
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    .expand-hint {
      margin-top: 4px;
      color: var(--muted-2);
      font-size: 13px;
      font-weight: 400;
    }

    td:first-child, th:first-child {
      width: 48px;
      text-align: right;
    }

    .expanded-row td:first-child {
      width: auto;
      text-align: left;
    }

    th:nth-child(2), td:nth-child(2) {
      width: 88px;
    }

    th:nth-child(3), td:nth-child(3) {
      width: 112px;
    }

    th:nth-child(4), td:nth-child(4) {
      width: 250px;
    }

    th:nth-child(6), td:nth-child(6) {
      width: 118px;
    }

    th:nth-child(7), td:nth-child(7) {
      width: 260px;
    }

    .finding {
      min-width: 0;
      font-weight: 650;
    }

    .agents {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .agent-list {
      display: grid;
      gap: 2px;
    }

    .agent-list span {
      white-space: nowrap;
    }

    .location {
      min-width: 0;
      color: var(--muted-2);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12.5px;
      overflow-wrap: anywhere;
    }

    .location-list {
      display: grid;
      gap: 6px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .problem {
      min-width: 0;
      color: var(--text);
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <section class="topbar">
      <div>
        <h1 id="review-title">PR Review</h1>
      </div>
    </section>

    <section class="summary" id="summary"></section>

    <div class="filters" id="filters"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th><button type="button" class="sort-button" data-sort-key="id"># <span class="sort-indicator" data-sort-indicator="id"></span></button></th>
            <th><button type="button" class="sort-button" data-sort-key="severity">Severity <span class="sort-indicator" data-sort-indicator="severity"></span></button></th>
            <th><button type="button" class="sort-button" data-sort-key="needsHumanCheck">Needs Human Check <span class="sort-indicator" data-sort-indicator="needsHumanCheck"></span></button></th>
            <th>Finding</th>
            <th>Problem</th>
            <th>Agent</th>
            <th>Location</th>
          </tr>
        </thead>
        <tbody id="findings-body"></tbody>
      </table>
    </div>
  </main>

  <script>
    const review = {
      title: "PR Review",
      branchSlug: "",
      reviewId: "",
      sourcePath: "",
      agents: [],
    };

    /*
      Replace this empty array when generating review.html.
      Finding schema:
      {
        id: number,
        severity: "High" | "Medium" | "Low",
        needsHumanCheck: number, // 1-10, where 10 most needs human judgment.
        title: string,
        problem: string,      // Visible in the table; usually one useful paragraph.
        description: string,  // Full markdown description from agent reports.
        fix: string,          // Full markdown suggested fix and tests.
        location: string,
        agents: string[]
      }
    */
    const findings = [];

    const severityFilters = ["All", "High", "Medium", "Low"];
    const severityRank = { High: 3, Medium: 2, Low: 1 };
    const defaultSortDirections = { id: "asc", severity: "desc", needsHumanCheck: "desc" };
    let activeSeverityFilter = "All";
    let activeAgentFilter = "All";
    let sortState = { key: "id", direction: "asc" };

    function countBy(predicate) {
      return findings.filter(predicate).length;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function visibleProblem(finding) {
      return finding.problem || (finding.description || "").split(/\n\s*\n/)[0];
    }

    function splitLocations(location) {
      if (Array.isArray(location)) {
        return location.map((item) => String(item).trim()).filter(Boolean);
      }

      return String(location || "")
        .split(/\s*;\s*|\n+/)
        .map((item) => item.trim())
        .filter(Boolean);
    }

    function renderLocationList(location) {
      return `<ul class="location-list">${splitLocations(location).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
    }

    function renderAgentList(agents) {
      return `<div class="agent-list">${(agents || []).map((agent) => `<span>${escapeHtml(agent)}</span>`).join("")}</div>`;
    }

    function renderMarkdown(text) {
      if (window.marked?.parse) {
        return window.marked.parse(text || "");
      }

      return String(text || "")
        .trim()
        .split(/\n\s*\n/)
        .filter(Boolean)
        .map((paragraph) => `<p>${escapeHtml(paragraph)}</p>`)
        .join("");
    }

    function agentsForFilters() {
      return Array.from(new Set(findings.flatMap((finding) => finding.agents || []))).sort();
    }

    function matchesFilter(finding) {
      const severityMatches = activeSeverityFilter === "All" || finding.severity === activeSeverityFilter;
      const agentMatches = activeAgentFilter === "All" || (finding.agents || []).includes(activeAgentFilter);
      return severityMatches && agentMatches;
    }

    function severityClass(severity) {
      return String(severity || "Low").toLowerCase();
    }

    function sortValue(finding, key) {
      if (key === "severity") {
        return severityRank[finding.severity] || 0;
      }

      if (key === "needsHumanCheck") {
        return Number(finding.needsHumanCheck) || 0;
      }

      return Number(finding.id) || 0;
    }

    function sortedFindings() {
      const directionMultiplier = sortState.direction === "asc" ? 1 : -1;

      return findings
        .filter(matchesFilter)
        .sort((left, right) => {
          const leftValue = sortValue(left, sortState.key);
          const rightValue = sortValue(right, sortState.key);

          if (leftValue === rightValue) {
            return (Number(left.id) || 0) - (Number(right.id) || 0);
          }

          return leftValue > rightValue ? directionMultiplier : -directionMultiplier;
        });
    }

    function setupSortButtons() {
      document.querySelectorAll("[data-sort-key]").forEach((button) => {
        button.addEventListener("click", () => {
          const key = button.dataset.sortKey;
          const direction = sortState.key === key
            ? (sortState.direction === "asc" ? "desc" : "asc")
            : (defaultSortDirections[key] || "asc");

          sortState = { key, direction };
          render();
        });
      });
    }

    function renderSortIndicators() {
      document.querySelectorAll("[data-sort-indicator]").forEach((indicator) => {
        indicator.textContent = indicator.dataset.sortIndicator === sortState.key
          ? (sortState.direction === "asc" ? "↑" : "↓")
          : "";
      });
    }

    function renderHeader() {
      document.title = review.title || "PR Review";
      document.querySelector("#review-title").textContent = review.title || "PR Review";
    }

    function renderSummary() {
      const stats = [
        ["Total", findings.length],
        ["High", countBy((finding) => finding.severity === "High")],
        ["Medium", countBy((finding) => finding.severity === "Medium")],
        ["Low", countBy((finding) => finding.severity === "Low")],
        ["Architectural", countBy((finding) => (finding.agents || []).includes("architecture-reviewer"))],
        ["Simplifications", countBy((finding) => (finding.agents || []).includes("simplification-reviewer"))],
        ["Bugs", countBy((finding) => (finding.agents || []).includes("bug-reviewer"))],
        ["Nitpicks", countBy((finding) => (finding.agents || []).includes("nitpick-reviewer"))],
        ["Code Standard", countBy((finding) => (finding.agents || []).includes("code-standard-reviewer"))],
      ].filter(([label, value]) => label === "Total" || value > 0);

      document.querySelector("#summary").innerHTML = stats.map(([label, value]) => `
        <article class="stat">
          <strong>${value}</strong>
          <span class="muted">${escapeHtml(label)}</span>
        </article>
      `).join("");
    }

    function renderFilters() {
      const agentFilters = ["All", ...agentsForFilters()];
      document.querySelector("#filters").innerHTML = `
        <div class="filter-row">
          <strong>Severity</strong>
          ${severityFilters.map((filter) => `<button type="button" class="${filter === activeSeverityFilter ? "active" : ""}" data-filter-group="severity" data-filter="${escapeHtml(filter)}">${escapeHtml(filter)}</button>`).join("")}
        </div>
        <div class="filter-row">
          <strong>Agent</strong>
          ${agentFilters.map((filter) => `<button type="button" class="${filter === activeAgentFilter ? "active" : ""}" data-filter-group="agent" data-filter="${escapeHtml(filter)}">${escapeHtml(filter)}</button>`).join("")}
        </div>
      `;

      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          if (button.dataset.filterGroup === "severity") {
            activeSeverityFilter = button.dataset.filter;
          } else {
            activeAgentFilter = button.dataset.filter;
          }
          render();
        });
      });
    }

    function renderTable() {
      const rows = sortedFindings().map((finding) => {
        const isExpanded = Boolean(finding.expanded);
        const severity = finding.severity || "Low";
        const description = finding.description || finding.problem || "";

        return `
          <tr class="review-row ${severityClass(severity)}" data-finding-id="${finding.id}" aria-expanded="${isExpanded}">
            <td>${finding.id}</td>
            <td><span class="pill ${severityClass(severity)}">${escapeHtml(severity)}</span></td>
            <td>${escapeHtml(finding.needsHumanCheck ?? "")}</td>
            <td class="finding">
              ${escapeHtml(finding.title)}
              <div class="expand-hint">${isExpanded ? "Click to collapse" : "Click for more details and suggested fix"}</div>
            </td>
            <td class="problem">${escapeHtml(visibleProblem(finding))}</td>
            <td class="agents">${renderAgentList(finding.agents)}</td>
            <td class="location">${renderLocationList(finding.location)}</td>
          </tr>
          ${isExpanded ? `
            <tr class="expanded-row">
              <td colspan="7">
                <div class="expanded-content">
                  <section>
                    <h3>Description</h3>
                    <div class="rich-text">${renderMarkdown(description)}</div>
                  </section>
                  <section>
                    <h3>Suggested fix</h3>
                    <div class="rich-text">${renderMarkdown(finding.fix || "")}</div>
                  </section>
                </div>
              </td>
            </tr>
          ` : ""}
        `;
      }).join("");

      document.querySelector("#findings-body").innerHTML = rows;
      if (window.Prism) {
        Prism.highlightAllUnder(document.querySelector("#findings-body"));
      }
      document.querySelectorAll("[data-finding-id]").forEach((row) => {
        row.addEventListener("click", () => {
          const id = Number(row.dataset.findingId);
          const finding = findings.find((item) => item.id === id);
          finding.expanded = !finding.expanded;
          renderTable();
        });
      });
    }

    function render() {
      renderHeader();
      renderSummary();
      renderFilters();
      renderSortIndicators();
      renderTable();
    }

    setupSortButtons();
    render();
  </script>
</body>
</html>
